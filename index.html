<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laundry Industry Intelligence Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

header{

    background:white;
    padding:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);

}

h1{

    margin:15px 0;
    text-align:center;
    font-size:34px;

}

.content{

    width:95%;
    margin:auto;

}

.chart{

    margin-top:30px;
    display:flex;
    justify-content:center;

}

.card{

    width:1000px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.12);

}

</style>

</head>

<body>

<header>
<header>

<script type="module"
src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js">
</script>

<tv-ticker-tape
symbols="
FX:USDTRY,
FX:EURTRY,
FX:EURUSD,
CMCMARKETS:GOLD,
FX:COPPER,
FX:BRENT">
</tv-ticker-tape>

</header>
</header>

<h1>

Laundry Industry Intelligence Dashboard

</h1>

<div class="content">

<div class="chart">

<div class="card">

<div class="tradingview-widget-container">

<div id="tv_chart"></div>

<script
type="text/javascript"
src="https://s3.tradingview.com/tv.js">
</script>

<script>

new TradingView.widget({

"autosize":true,

"symbol":"FX:USDTRY",

"interval":"30",

"timezone":"Europe/Istanbul",

"theme":"light",

"style":"1",

"locale":"en",

"toolbar_bg":"#f1f3f6",

"enable_publishing":false,

"hide_top_toolbar":false,

"allow_symbol_change":true,

"container_id":"tv_chart"

});

</script>

</div>

</div>

</div>

</div>

</body>
</html>
