<!DOCTYPE html>
<html>
<head>
<title>Laundry Market Dashboard</title>

<style>

body {
    font-family: Arial, sans-serif;
    margin:0;
    background:#ffffff;
}

.ticker {
    width:100%;
    overflow:hidden;
    background:#eeeeee;
    padding:12px 0;
}

.move {
    display:inline-block;
    white-space:nowrap;
    animation:kay 18s linear infinite;
    font-size:18px;
}

@keyframes kay {
    from {
        transform:translateX(100%);
    }
    to {
        transform:translateX(-100%);
    }
}

.dashboard {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.card {
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1 {
    text-align:center;
}

</style>

</head>

<body>


<div class="ticker">
<div class="move">

💵 USD/TRY ▲ &nbsp;&nbsp;
💶 EUR/TRY ▲ &nbsp;&nbsp;
🛢 Brent Oil &nbsp;&nbsp;
🥇 Gold &nbsp;&nbsp;
🔩 Copper &nbsp;&nbsp;
🏨 Hotel Projects &nbsp;&nbsp;
🏥 Hospital Projects

</div>
</div>


<h1>
Laundry Industry Intelligence Dashboard
</h1>


<div class="dashboard">


<div class="card">

<iframe
frameborder="0"
width="350"
height="220"
src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?locale=tr#%7B%22symbol%22%3A%22FX%3AUSDTRY%22%2C%22width%22%3A%22350%22%2C%22height%22%3A%22220%22%2C%22dateRange%22%3A%221D%22%2C%22colorTheme%22%3A%22light%22%2C%22trendLineColor%22%3A%22rgba(41%2C%2098%2C%20255%2C%201)%22%2C%22underLineColor%22%3A%22rgba(41%2C%2098%2C%20255%2C%200.3)%22%2C%22isTransparent%22%3Afalse%2C%22autosize%22%3Afalse%7D">
</iframe>

</div>


</div>


</body>
</html>
