<!DOCTYPE html>
<html>
<head>
<title>Laundry Market Dashboard</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:white;
}

.ticker {
    width:100%;
    overflow:hidden;
    background:#eeeeee;
    padding:15px 0;
}

.move {
    display:inline-block;
    white-space:nowrap;
    animation:kay 15s linear infinite;
}

@keyframes kay {
    from {
        transform:translateX(100%);
    }
    to {
        transform:translateX(-100%);
    }
}

h1 {
    text-align:center;
}
</style>

</head>

<body>

<div class="ticker">
<div class="move">

💱 EUR/TRY ▲ &nbsp;&nbsp;
💵 USD/TRY ▲ &nbsp;&nbsp;
🛢 Brent Oil &nbsp;&nbsp;
🥇 Gold &nbsp;&nbsp;
🏨 Hotel Projects &nbsp;&nbsp;
🏥 Hospital Projects

</div>
</div>

<h1>
Laundry Industry  Dashboard
</h1>

</body>
</html>
